<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roshi Flowers</title>

<link rel="icon" type="image/svg+xml" href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"%3E%3Ccircle cx="32" cy="32" r="20" fill="%23ff5fa2"/%3E%3Ctext x="32" y="40" font-size="22" text-anchor="middle"%3E🌸%3C/text%3E%3C/svg%3E'>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Manrope:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --rose:#ff5fa2;
  --blush:#ff8fbe;
}

html {
  scroll-behavior: smooth;
}

body {
  margin:0;
  font-family:"Manrope",sans-serif;
  background:linear-gradient(135deg,#fff0f6,#ffe4ef);
  overflow-x:hidden;
}

/* HEADER */
header {
  text-align:center;
  padding:50px;
  background:linear-gradient(135deg,#ff9ac1,#ff5fa2);
  color:white;
}

header h1 {
  font-size: 2.8rem;
  letter-spacing: 1px;
}

/* NAV */
nav {
  display:flex;
  justify-content:center;
  gap:25px;
  padding:15px;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(10px);
  position: sticky;
  top: 0;
  z-index: 1000;
}

nav a {
  text-decoration:none;
  color:var(--rose);
  font-weight:bold;
}

/* HERO */
.hero {
  position: relative;
  min-height: 100vh;
  display: flex;
  flex-direction: column; 
  justify-content: center;
  align-items: center;
  overflow: hidden;
  text-align: center;
  padding: 20px 0;
}

.hero-grid {
  display: grid;
  grid-template-columns: repeat(6, 180px);
  grid-auto-flow: column;
  gap: 25px;
  z-index: 0;
  margin-bottom: 40px; 
}

.square {
  width: 180px;
  height: 180px;
  border-radius: 15px;
  overflow: hidden;
}

.square img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.square.offset {
  margin-top: 90px;
}

.hero-text {
  position: relative;
  z-index: 1;
}

.text-overlay {
  background: rgba(0, 0, 0, 0.5);
  padding: 30px;
  border-radius: 20px;
}

.text-overlay h2,
.text-overlay p {
  color: white;
}

/* BUTTON */
.button {
  background:var(--rose);
  color:white;
  padding:12px 25px;
  border-radius:30px;
  text-decoration:none;
  font-weight:bold;
  margin:8px;
  display:inline-block;
  transition:0.3s;
  cursor:pointer;
}

.button:hover {
  background:var(--blush);
  transform:scale(1.05);
}

/* SECTIONS */
section {
  padding:70px 20px;
  text-align:center;
}

/* CARDS */
.services {
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:30px;
}

.card {
  background:white;
  width:280px;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  animation: fadeUp 0.8s ease forwards;
}

.card:hover {
  transform:translateY(-8px);
}

.card img {
  width:100%;
  height:230px;
  object-fit:cover;
}

@keyframes fadeUp {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

/* GALLERY */
.gallery-scroll {
  display:flex;
  gap:20px;
  overflow-x:auto;
  padding:20px;
}

.gallery-scroll img {
  height:250px;
  border-radius:20px;
  cursor:pointer;
  transition: transform 0.3s, box-shadow 0.3s;
}

.gallery-scroll img:hover {
  transform: scale(1.08);
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* FLOAT WHATSAPP */
.whatsapp-float {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  font-size: 24px;
  padding: 15px;
  border-radius: 50%;
  text-decoration: none;
  z-index: 1000;
}

/* POPUP + IMAGE VIEW remain same */
</style>
</head>

<body>

<header>
<h1>Roshi Flowers 🌸</h1>
<p>Where Every Bouquet Tells a Story</p>
</header>

<nav>
<a href="#about">About</a>
<a href="#services">Bouquets</a>
<a href="#gallery">Gallery</a>
<a href="#contact">Order</a>
</nav>

<section class="hero">
<div class="hero-grid">
<img src="flower1.jpg" loading="lazy">
<img src="flower2.jpg" loading="lazy">
<img src="flower3.jpeg" loading="lazy">
<img src="flower4.jpeg" loading="lazy">
</div>

<div class="text-overlay">
<h2>Beautiful Flowers for Every Special Moment</h2>
<p>Fresh • Elegant • Made with Love</p>
<button class="button" onclick="orderNow('General Order')">Order Now</button>
</div>
</section>

<section id="services">
<h2>Our Bouquets 💐</h2>

<div class="services">

<div class="card">
<img src="flower9.jpeg" loading="lazy">
<h3>Royal Bunch</h3>
<p>LKR 4500</p>
<button class="button" onclick="orderNow('Royal Bunch')">Order</button>
</div>

<div class="card">
<img src="flower5.jpeg" loading="lazy">
<h3>Sunshine Bunch</h3>
<p>LKR 3500</p>
<button class="button" onclick="orderNow('Sunshine Bunch')">Order</button>
</div>

<div class="card">
<img src="flower14.jpeg" loading="lazy">
<h3>Purity Bunch</h3>
<p>LKR 4000</p>
<button class="button" onclick="orderNow('Purity Bunch')">Order</button>
</div>

</div>
</section>

<section id="gallery">
<h2>Gallery 🌸</h2>
<div class="gallery-scroll">
<img src="flower1.jpg" loading="lazy">
<img src="flower2.jpg" loading="lazy">
<img src="flower3.jpeg" loading="lazy">
</div>
</section>

<footer>
© 2026 Roshi Flowers
</footer>

<a href="https://wa.me/94717865534" class="whatsapp-float">💬</a>

<script>
function orderNow(product){
  const message = `Hi! I'm interested in the ${product}. 🌸`;
  const url = "https://wa.me/94717865534?text=" + encodeURIComponent(message);
  window.open(url, "_blank");
}

/* IMPROVED FLOWERS */
let emojiCount = 0;
const maxEmojis = 25;

function spawnEmoji(){
  if (emojiCount > maxEmojis) return;

  const emojis=["🌸","🌷","🌹","💐","🌺"];
  const el=document.createElement("div");
  el.className="emoji";
  el.textContent=emojis[Math.floor(Math.random()*emojis.length)];

  el.style.left=Math.random()*window.innerWidth+"px";
  el.style.position="fixed";
  el.style.top="-50px";
  el.style.fontSize=(Math.random()*20+20)+"px";
  el.style.animation=`fall ${(Math.random()*3+4)}s linear`;

  document.body.appendChild(el);
  emojiCount++;

  setTimeout(()=>{
    el.remove();
    emojiCount--;
  },7000);
}

setInterval(spawnEmoji,1200);
</script>

</body>
</html>
